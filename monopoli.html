<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Monopoly Banker - Board Edition</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Library QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Kunci Layar 100% tanpa scroll pada body */
    html, body {
      height: 100dvh;
      width: 100vw;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 50%, #fef3c7 100%);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    /* Penyesuaian Video Kamera Scanner */
    #reader {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      border-radius: 0.75rem !important;
    }

    /* Scrollbar Halus untuk Riwayat */
    .custom-scroll::-webkit-scrollbar {
      width: 3px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="flex flex-col text-slate-800">

  <!-- HEADER (Fixed Height) -->
  <header class="sticky top-0 z-50 glass-card shadow-sm px-4 py-2.5 flex justify-between items-center flex-shrink-0">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-emerald-500 to-teal-400 flex items-center justify-center text-white shadow-md shadow-emerald-200">
        <i class="fa-solid fa-vault text-sm"></i>
      </div>
      <div>
        <h1 class="font-extrabold text-sm tracking-tight text-slate-800 leading-none">MONOPOLY <span class="text-emerald-600">BANKER</span></h1>
        <p class="text-[9px] font-medium text-slate-500 uppercase tracking-wider mt-0.5">Digital Cashier System</p>
      </div>
    </div>
    <button onclick="resetGame()" class="text-[11px] font-semibold bg-rose-50 text-rose-600 border border-rose-200 hover:bg-rose-100 px-3 py-1.5 rounded-xl transition-all shadow-sm active:scale-95 flex items-center gap-1">
      <i class="fa-solid fa-rotate-right"></i> Reset
    </button>
  </header>

  <!-- CONTAINER UTAMA (Fit Remaining Viewport) -->
  <main class="max-w-md w-full mx-auto p-2.5 flex-1 min-h-0 flex flex-col gap-2 overflow-hidden">

    <!-- DASHBOARD PEMAIN (Compact Flex-Shrink) -->
    <section class="glass-card rounded-2xl p-2.5 shadow-sm flex-shrink-0">
      <div class="flex justify-between items-center mb-1.5">
        <div class="flex items-center gap-1.5">
          <i class="fa-solid fa-users text-emerald-600 text-xs"></i>
          <h2 class="text-[10px] font-bold uppercase tracking-wider text-slate-600">Pemain Terdaftar</h2>
        </div>
        <span id="player-count-badge" class="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">
          0 Pemain
        </span>
      </div>

      <div id="player-list" class="grid grid-cols-2 gap-1.5">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- AREA SCANNER (Mengisi Sisa Ruang Fleksibel) -->
    <section class="glass-card rounded-2xl p-2.5 shadow-sm flex-1 min-h-0 flex flex-col gap-2 overflow-hidden">
      <div class="flex justify-between items-center flex-shrink-0">
        <h2 class="text-xs font-bold text-slate-800 flex items-center gap-1.5">
          <i class="fa-solid fa-qrcode text-emerald-600"></i> Scanner
        </h2>
        <span id="game-status-badge" class="text-[9px] font-bold bg-amber-100 text-amber-700 border border-amber-200 px-2 py-0.5 rounded-full">
          Fase: Registrasi
        </span>
      </div>

      <!-- Kamera Scanner Frame (Dynamic Flex Fill) -->
      <div class="relative rounded-xl overflow-hidden bg-slate-900 border border-slate-200 flex-1 min-h-0 w-full flex items-center justify-center">
        <div id="reader" class="w-full h-full"></div>
      </div>
      
      <button id="btn-start-camera" onclick="startCamera()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-2 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md shadow-emerald-200 transition-all active:scale-98 flex-shrink-0">
        <i class="fa-solid fa-camera"></i> Buka Kamera Scanner
      </button>

      <!-- FASE 1: PANEL REGISTRASI -->
      <div id="panel-registration" class="space-y-1.5 flex-shrink-0">
        <div class="bg-emerald-50/70 border border-emerald-100 rounded-xl p-2 text-center">
          <p class="text-[10px] font-medium text-slate-500">Instruksi Registrasi:</p>
          <p id="reg-status-text" class="text-[11px] font-semibold text-emerald-800">
            Scan QR Pemain untuk mendaftar & klaim modal ($150.000).
          </p>
        </div>
        <button id="btn-start-game" onclick="finalizeRegistration()" disabled class="w-full bg-slate-200 text-slate-400 font-bold py-2 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5">
          <i class="fa-solid fa-play"></i> Mulai Game (Min 2 Pemain)
        </button>
      </div>

      <!-- FASE 2: PANEL GAMEPLAY -->
      <div id="panel-gameplay" class="hidden space-y-2 flex-shrink-0">
        <!-- Mode Selector -->
        <div class="grid grid-cols-4 gap-1">
          <button onclick="setTransactionMode('BUY')" id="btn-BUY" class="mode-btn bg-emerald-600 text-white py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 shadow-sm transition-all">
            <i class="fa-solid fa-cart-plus text-xs"></i> Beli/Up
          </button>
          <button onclick="setTransactionMode('RENT')" id="btn-RENT" class="mode-btn bg-white text-slate-600 border border-slate-200 py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 transition-all">
            <i class="fa-solid fa-hand-holding-dollar text-xs"></i> Sewa
          </button>
          <button onclick="setTransactionMode('GO')" id="btn-GO" class="mode-btn bg-white text-slate-600 border border-slate-200 py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 transition-all">
            <i class="fa-solid fa-flag-checkered text-xs"></i> START
          </button>
          <button onclick="setTransactionMode('BANK')" id="btn-BANK" class="mode-btn bg-white text-slate-600 border border-slate-200 py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 transition-all">
            <i class="fa-solid fa-box-open text-xs"></i> Bank
          </button>
        </div>

        <!-- FORM INPUT UNTUK KARTU / DANA UMUM -->
        <div id="bank-input-container" class="hidden bg-purple-50/80 border border-purple-100 p-2 rounded-xl space-y-1.5">
          <div class="flex items-center justify-between gap-1.5">
            <select id="bank-action-type" class="bg-white border border-slate-200 text-[11px] font-bold text-slate-700 rounded-lg px-2 py-1 outline-none focus:border-purple-400">
              <option value="RECEIVE">Dapat Uang (+)</option>
              <option value="PAY">Bayar Denda/Pajak (-)</option>
            </select>
            <div class="flex items-center gap-1 bg-white border border-slate-200 rounded-lg px-2 py-1">
              <span class="text-[11px] font-bold text-slate-400">$</span>
              <input type="number" id="bank-amount" placeholder="Nominal" value="10000" step="1000" class="w-16 text-[11px] font-bold text-slate-800 outline-none">
            </div>
          </div>
        </div>

        <div class="bg-white/90 border border-slate-200/80 rounded-xl p-2 text-center shadow-sm">
          <p id="status-text" class="text-[11px] font-bold text-emerald-700">[Mode BUY] Scan QR Pemain terlebih dahulu.</p>
        </div>
      </div>

    </section>

    <!-- RIWAYAT TRANSAKSI (Compact Fixed-Height Panel) -->
    <section class="glass-card rounded-2xl p-2.5 shadow-sm flex-shrink-0 flex flex-col max-h-[110px] overflow-hidden">
      <h2 class="text-[10px] font-bold text-slate-600 uppercase tracking-wider mb-1 flex items-center gap-1.5 flex-shrink-0">
        <i class="fa-solid fa-clock-rotate-left text-emerald-600"></i> Riwayat Transaksi
      </h2>
      <div id="log-list" class="space-y-1 overflow-y-auto custom-scroll text-[11px] pr-1 flex-1">
        <!-- Rendered by JS -->
      </div>
    </section>

  </main>

  <script>
    const INITIAL_BANK_MONEY = 150000;

    // DATABASE 28 KARTU PROPERTI
    const PROPERTIES = {
      // --- SISI KANAN (START -> PENJARA) ---
      'PROP_IDN': { type: 'COUNTRY', name: 'Indonesia (Kompleks A)', price: 6000, housePrice: 5000, hotelPrice: 25000, rent: [400, 2000, 6000, 18000, 32000, 45000], mortgage: 3000 },
      'PROP_MYS': { type: 'COUNTRY', name: 'Malaysia (Kompleks A)', price: 6000, housePrice: 5000, hotelPrice: 25000, rent: [200, 1000, 3000, 9000, 16000, 25000], mortgage: 3000 },
      'PROP_STN_CHANGI': { type: 'STATION', name: 'Bandara Changi ✈️', price: 20000, rentTable: [2500, 5000, 10000, 20000], mortgage: 10000 },
      'PROP_SGP': { type: 'COUNTRY', name: 'Singapura (Kompleks B)', price: 10000, housePrice: 5000, hotelPrice: 25000, rent: [600, 3000, 9000, 27000, 40000, 55000], mortgage: 4000 },
      'PROP_HKG': { type: 'COUNTRY', name: 'Hongkong (Kompleks B)', price: 10000, housePrice: 5000, hotelPrice: 25000, rent: [800, 4000, 12000, 36000, 48000, 64000], mortgage: 5000 },
      'PROP_TWN': { type: 'COUNTRY', name: 'Taiwan (Kompleks B)', price: 12000, housePrice: 5000, hotelPrice: 25000, rent: [800, 4000, 12000, 36000, 48000, 64000], mortgage: 5000 },

      // --- SISI BAWAH (PENJARA -> BEBAS PARKIR) ---
      'PROP_PHL': { type: 'COUNTRY', name: 'Philipina (Kompleks C)', price: 14000, housePrice: 10000, hotelPrice: 50000, rent: [1200, 6000, 8000, 50000, 70000, 90000], mortgage: 8000 },
      'PROP_ELEC': { type: 'UTILITY', name: 'Perusahaan Listrik ⚡', price: 15000, mortgage: 3750, rules: '1 Kompleks = 4x dadu | 2 Kompleks = 10x dadu' },
      'PROP_THA': { type: 'COUNTRY', name: 'Thailand (Kompleks C)', price: 14000, housePrice: 10000, hotelPrice: 50000, rent: [1000, 5000, 15000, 45000, 60000, 80000], mortgage: 7000 },
      'PROP_VNM': { type: 'COUNTRY', name: 'Vietnam (Kompleks C)', price: 16000, housePrice: 10000, hotelPrice: 50000, rent: [1000, 5000, 15000, 45000, 60000, 80000], mortgage: 7000 },
      'PROP_STN_TOKYO': { type: 'STATION', name: 'Terminal Bus Tokyo 🚌', price: 20000, rentTable: [2500, 5000, 10000, 20000], mortgage: 10000 },
      'PROP_JPN': { type: 'COUNTRY', name: 'Jepang (Kompleks D)', price: 18000, housePrice: 10000, hotelPrice: 50000, rent: [1800, 9000, 25000, 70000, 87500, 105000], mortgage: 11000 },
      'PROP_KOR': { type: 'COUNTRY', name: 'Korea Selatan (Kompleks D)', price: 18000, housePrice: 10000, hotelPrice: 50000, rent: [1600, 8000, 22000, 60000, 80000, 100000], mortgage: 10000 },
      'PROP_IND': { type: 'COUNTRY', name: 'India (Kompleks D)', price: 20000, housePrice: 10000, hotelPrice: 50000, rent: [1400, 7000, 20000, 55000, 75000, 95000], mortgage: 9000 },

      // --- SISI KIRI (BEBAS PARKIR -> PENJARA) ---
      'PROP_CHN': { type: 'COUNTRY', name: 'China (Kompleks E)', price: 22000, housePrice: 15000, hotelPrice: 75000, rent: [2000, 10000, 30000, 75000, 92500, 110000], mortgage: 12000 },
      'PROP_RUS': { type: 'COUNTRY', name: 'Rusia (Kompleks E)', price: 22000, housePrice: 15000, hotelPrice: 75000, rent: [2000, 10000, 30000, 75000, 92500, 110000], mortgage: 12000 },
      'PROP_ITA': { type: 'COUNTRY', name: 'Italy (Kompleks E)', price: 24000, housePrice: 15000, hotelPrice: 75000, rent: [1800, 9000, 25000, 70000, 87500, 105000], mortgage: 11000 },
      'PROP_STN_LONDON': { type: 'STATION', name: 'Stasiun London 🚆', price: 20000, rentTable: [2500, 5000, 10000, 20000], mortgage: 10000 },
      'PROP_GBR': { type: 'COUNTRY', name: 'Inggris (Kompleks F)', price: 25000, housePrice: 15000, hotelPrice: 75000, rent: [2400, 14000, 36000, 85000, 102000, 120000], mortgage: 14000 },
      'PROP_FRA': { type: 'COUNTRY', name: 'Perancis (Kompleks F)', price: 25000, housePrice: 15000, hotelPrice: 75000, rent: [2200, 11000, 33000, 80000, 97500, 115000], mortgage: 13000 },
      'PROP_WATER': { type: 'UTILITY', name: 'Perusahaan Air 💧', price: 15000, mortgage: 3750, rules: '1 Kompleks = 4x dadu | 2 Kompleks = 10x dadu' },
      'PROP_NLD': { type: 'COUNTRY', name: 'Belanda (Kompleks F)', price: 28000, housePrice: 15000, hotelPrice: 75000, rent: [2200, 11000, 33000, 80000, 97500, 115000], mortgage: 13000 },

      // --- SISI ATAS (PENJARA -> START) ---
      'PROP_CAN': { type: 'COUNTRY', name: 'Kanada (Kompleks G)', price: 30000, housePrice: 20000, hotelPrice: 100000, rent: [2600, 13000, 39000, 90000, 110000, 127500], mortgage: 15000 },
      'PROP_USA': { type: 'COUNTRY', name: 'Amerika (Kompleks G)', price: 30000, housePrice: 20000, hotelPrice: 100000, rent: [2800, 15000, 45000, 100000, 120000, 140000], mortgage: 16000 },
      'PROP_BRA': { type: 'COUNTRY', name: 'Brazil (Kompleks G)', price: 32000, housePrice: 20000, hotelPrice: 100000, rent: [2600, 13000, 39000, 90000, 110000, 127500], mortgage: 15000 },
      'PROP_STN_SIDNEY': { type: 'STATION', name: 'Pelabuhan Sidney 🚢', price: 20000, rentTable: [2500, 5000, 10000, 20000], mortgage: 10000 },
      'PROP_AUS': { type: 'COUNTRY', name: 'Australia (Kompleks H)', price: 35000, housePrice: 20000, hotelPrice: 100000, rent: [2800, 15000, 45000, 100000, 120000, 140000], mortgage: 16000 },
      'PROP_EGY': { type: 'COUNTRY', name: 'Mesir (Kompleks H)', price: 40000, housePrice: 20000, hotelPrice: 100000, rent: [5000, 20000, 60000, 140000, 170000, 200000], mortgage: 20000 }
    };

    const MASTER_PLAYERS = {
      'P1': { name: 'Pemain 1', badge: 'bg-blue-500', bg: 'from-blue-50 to-indigo-50/50', border: 'border-blue-200' },
      'P2': { name: 'Pemain 2', badge: 'bg-rose-500', bg: 'from-rose-50 to-pink-50/50', border: 'border-rose-200' },
      'P3': { name: 'Pemain 3', badge: 'bg-emerald-500', bg: 'from-emerald-50 to-teal-50/50', border: 'border-emerald-200' },
      'P4': { name: 'Pemain 4', badge: 'bg-amber-500', bg: 'from-amber-50 to-orange-50/50', border: 'border-amber-200' }
    };

    let state = {
      isStarted: false,
      players: {},
      ownership: {},
      logs: [],
      mode: 'BUY',
      selectedPlayer: null
    };

    let html5QrCode = null;
    let lastScannedCode = null;
    let scanCooldownTimer = null;

    function init() {
      renderPlayers();
      renderLogs();
    }

    function startCamera() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => initCameraScanner()).catch(() => initCameraScanner());
      } else {
        initCameraScanner();
      }
    }

    function initCameraScanner() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { 
        fps: 20, 
        qrbox: null, 
        videoConstraints: {
          width: { min: 640, ideal: 1280, max: 1920 },
          height: { min: 480, ideal: 720, max: 1080 },
          facingMode: "environment"
        }
      };

      html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        handleScanResult
      ).then(() => {
        document.getElementById('btn-start-camera').classList.add('hidden');
      }).catch(err => {
        alert("Gagal mengakses kamera. Pastikan izin kamera diberikan.");
      });
    }

    function handleScanResult(qrCodeData) {
      let data = qrCodeData.trim().toUpperCase().replace(/\.(PNG|JPG|JPEG)$/i, '');

      if (data === lastScannedCode) return;

      lastScannedCode = data;
      clearTimeout(scanCooldownTimer);
      scanCooldownTimer = setTimeout(() => { lastScannedCode = null; }, 2500);

      // FASE 1: REGISTRASI
      if (!state.isStarted) {
        if (MASTER_PLAYERS[data]) {
          if (state.players[data]) {
            alert(`${MASTER_PLAYERS[data].name} sudah terdaftar!`);
            return;
          }
          state.players[data] = { ...MASTER_PLAYERS[data], balance: INITIAL_BANK_MONEY };
          addLog(`<b>${MASTER_PLAYERS[data].name}</b> terdaftar ($${INITIAL_BANK_MONEY.toLocaleString()})`);
          renderPlayers();
          updateLobbyUI();
        } else {
          alert(`QR Terbaca: "${qrCodeData}"\nSistem registrasi hanya menerima QR: P1, P2, P3, P4`);
        }
        return;
      }

      // FASE 2: GAMEPLAY - PEMAIN SCAN
      if (state.players[data]) {
        state.selectedPlayer = data;

        if (state.mode === 'GO') {
          state.players[data].balance += 20000;
          addLog(`<b>${state.players[data].name}</b> melewati START (+ $20.000)`);
          state.selectedPlayer = null;
          renderPlayers();
        } else if (state.mode === 'BANK') {
          const action = document.getElementById('bank-action-type').value;
          const amount = parseInt(document.getElementById('bank-amount').value) || 0;

          if (amount <= 0) {
            alert("Masukkan nominal transaksi terlebih dahulu!");
            return;
          }

          if (action === 'RECEIVE') {
            state.players[data].balance += amount;
            addLog(`🎁 <b>${state.players[data].name}</b> terima <b>$${amount.toLocaleString()}</b>`);
          } else if (action === 'PAY') {
            if (state.players[data].balance < amount) {
              alert(`Saldo ${state.players[data].name} tidak cukup!`);
              return;
            }
            state.players[data].balance -= amount;
            addLog(`💸 <b>${state.players[data].name}</b> bayar <b>$${amount.toLocaleString()}</b>`);
          }

          state.selectedPlayer = null;
          renderPlayers();
        }

        updateStatusUI();
        return;
      }

      // PROPERTI SCAN
      if (PROPERTIES[data]) {
        const prop = PROPERTIES[data];
        const propState = state.ownership[data];

        if (state.mode === 'BUY') {
          if (!state.selectedPlayer) { alert("Scan QR Pemain terlebih dahulu!"); return; }

          if (!propState) {
            if (state.players[state.selectedPlayer].balance < prop.price) { alert(`Saldo tidak cukup! Harga: $${prop.price.toLocaleString()}`); return; }

            state.players[state.selectedPlayer].balance -= prop.price;
            state.ownership[data] = { owner: state.selectedPlayer, level: 0 };
            addLog(`<b>${state.players[state.selectedPlayer].name}</b> beli <b>${prop.name}</b> (-$${prop.price.toLocaleString()})`);
          } else if (propState.owner === state.selectedPlayer) {
            if (prop.type !== 'COUNTRY') {
              alert(`Properti ${prop.name} tidak dapat dibangun Rumah/Hotel!`);
              return;
            }

            if (propState.level >= 5) { alert(`Properti sudah memiliki Hotel!`); return; }
            
            const upgradeCost = propState.level === 4 ? prop.hotelPrice : prop.housePrice;

            if (state.players[state.selectedPlayer].balance < upgradeCost) { 
              alert(`Saldo tidak cukup! Biaya: $${upgradeCost.toLocaleString()}`); 
              return; 
            }

            state.players[state.selectedPlayer].balance -= upgradeCost;
            propState.level += 1;
            const label = propState.level === 5 ? "Hotel 🏨" : `Rumah ke-${propState.level} 🏠`;
            addLog(`<b>${state.players[state.selectedPlayer].name}</b> bangun ${label} di <b>${prop.name}</b>`);
          } else {
            alert(`Properti ini milik ${state.players[propState.owner].name}!`);
          }

          state.selectedPlayer = null;
          renderPlayers();
          updateStatusUI();

        } else if (state.mode === 'RENT') {
          if (!propState) { alert(`Properti ${prop.name} belum dimiliki siapapun!`); return; }
          if (!state.selectedPlayer) { alert("Scan QR Pemain yang singgah!"); return; }
          if (propState.owner === state.selectedPlayer) { alert("Pemain berada di properti sendiri!"); state.selectedPlayer = null; updateStatusUI(); return; }

          const visitorId = state.selectedPlayer;
          const ownerId = propState.owner;
          let calculatedRent = 0;

          if (prop.type === 'COUNTRY') {
            calculatedRent = prop.rent[propState.level];
          } else if (prop.type === 'UTILITY') {
            const diceInput = prompt(`Kalkulasi Sewa (${prop.name}):\nMasukkan total kocokan 2 Dadu:`, "7");
            const diceVal = parseInt(diceInput) || 0;
            
            const utilityCount = Object.keys(state.ownership).filter(pKey => {
              return PROPERTIES[pKey].type === 'UTILITY' && state.ownership[pKey].owner === ownerId;
            }).length;

            const multiplier = utilityCount >= 2 ? 10 : 4;
            calculatedRent = diceVal * multiplier;
          } else if (prop.type === 'STATION') {
            const stationCount = Object.keys(state.ownership).filter(pKey => {
              return PROPERTIES[pKey].type === 'STATION' && state.ownership[pKey].owner === ownerId;
            }).length;

            const index = Math.min(stationCount - 1, prop.rentTable.length - 1);
            calculatedRent = prop.rentTable[index >= 0 ? index : 0];
          }

          if (state.players[visitorId].balance < calculatedRent) {
            alert(`Saldo ${state.players[visitorId].name} tidak mencukupi untuk bayar sewa $${calculatedRent.toLocaleString()}!`);
            return;
          }

          state.players[visitorId].balance -= calculatedRent;
          state.players[ownerId].balance += calculatedRent;

          addLog(`<b>${state.players[visitorId].name}</b> bayar sewa ke <b>${state.players[ownerId].name}</b> ($${calculatedRent.toLocaleString()})`);

          state.selectedPlayer = null;
          renderPlayers();
          updateStatusUI();
        }
      } else {
        alert(`Kode "${qrCodeData}" tidak terdaftar!`);
      }
    }

    function updateLobbyUI() {
      const count = Object.keys(state.players).length;
      document.getElementById('player-count-badge').innerText = `${count} Pemain`;

      const startBtn = document.getElementById('btn-start-game');
      if (count >= 2) {
        startBtn.disabled = false;
        startBtn.className = "w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-2 rounded-xl text-xs transition-all shadow-md shadow-emerald-200 active:scale-98 flex items-center justify-center gap-1.5 cursor-pointer flex-shrink-0";
      } else {
        startBtn.disabled = true;
        startBtn.className = "w-full bg-slate-200 text-slate-400 font-bold py-2 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 cursor-not-allowed flex-shrink-0";
      }
    }

    function finalizeRegistration() {
      if (Object.keys(state.players).length < 2) return;
      state.isStarted = true;
      
      const badge = document.getElementById('game-status-badge');
      badge.className = "text-[9px] font-bold bg-emerald-100 text-emerald-800 border border-emerald-200 px-2 py-0.5 rounded-full";
      badge.innerText = "Status: Game Berjalan";

      document.getElementById('panel-registration').classList.add('hidden');
      document.getElementById('panel-gameplay').classList.remove('hidden');

      addLog("🎲 <b>Permainan Dimulai!</b>");
      updateStatusUI();
    }

    function renderPlayers() {
      const container = document.getElementById('player-list');
      container.innerHTML = '';
      const playerKeys = Object.keys(state.players);

      if (playerKeys.length === 0) {
        container.innerHTML = `
          <div class="col-span-2 text-center py-3 border border-dashed border-slate-300 rounded-xl bg-white/40">
            <p class="text-[11px] font-semibold text-slate-400">Belum ada pemain terdaftar</p>
          </div>
        `;
        return;
      }
      
      playerKeys.forEach(pId => {
        const p = state.players[pId];
        const properties = Object.keys(state.ownership).filter(prop => state.ownership[prop].owner === pId);
        
        container.innerHTML += `
          <div class="bg-gradient-to-br ${p.bg} border ${p.border} px-2.5 py-1.5 rounded-xl shadow-sm flex flex-col justify-between">
            <div class="flex justify-between items-center">
              <div class="flex items-center gap-1">
                <span class="w-2 h-2 rounded-full ${p.badge}"></span>
                <span class="font-bold text-[11px] text-slate-700">${p.name}</span>
              </div>
              <span class="text-[9px] font-bold bg-white/80 text-slate-500 px-1.5 py-0.2 rounded-md border border-slate-100">${properties.length} Aset</span>
            </div>
            <p class="text-xs font-extrabold text-slate-800 mt-0.5">$${p.balance.toLocaleString()}</p>
          </div>
        `;
      });
    }

    function setTransactionMode(mode) {
      state.mode = mode;
      state.selectedPlayer = null;
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.className = 'mode-btn bg-white text-slate-600 border border-slate-200 py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 transition-all';
      });

      const bankContainer = document.getElementById('bank-input-container');
      if (mode === 'BANK') {
        bankContainer.classList.remove('hidden');
      } else {
        bankContainer.classList.add('hidden');
      }

      const activeBtn = document.getElementById(`btn-${mode}`);
      if (mode === 'BUY') activeBtn.className = 'mode-btn bg-emerald-600 text-white py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 shadow-sm transition-all';
      if (mode === 'RENT') activeBtn.className = 'mode-btn bg-amber-500 text-white py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 shadow-sm transition-all';
      if (mode === 'GO') activeBtn.className = 'mode-btn bg-sky-500 text-white py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 shadow-sm transition-all';
      if (mode === 'BANK') activeBtn.className = 'mode-btn bg-purple-600 text-white py-1.5 px-1 rounded-lg font-bold text-[10px] flex flex-col items-center gap-0.5 shadow-sm transition-all';

      updateStatusUI();
    }

    function updateStatusUI() {
      const statusText = document.getElementById('status-text');

      if (state.mode === 'BANK') {
        statusText.innerText = `[Mode Bank] Tentukan nominal lalu Scan QR Pemain.`;
      } else if (!state.selectedPlayer) {
        statusText.innerText = `[Mode ${state.mode}] Scan QR Pemain terlebih dahulu.`;
      } else {
        statusText.innerText = `Pemain ${state.selectedPlayer} dipilih. Silakan Scan QR Properti.`;
      }
    }

    function addLog(message) {
      const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      state.logs.unshift({ message, time });
      renderLogs();
    }

    function renderLogs() {
      const container = document.getElementById('log-list');
      if (state.logs.length === 0) {
        container.innerHTML = `<p class="text-slate-400 text-center py-2 text-[10px]">Belum ada aktivitas transaksi.</p>`;
        return;
      }
      
      container.innerHTML = state.logs.map(log => `
        <div class="flex justify-between items-center p-1.5 bg-white/70 rounded-lg border border-slate-100 shadow-2xs">
          <span class="text-slate-700 text-[10px]">${log.message}</span>
          <span class="text-[9px] text-slate-400 font-mono ml-2 shrink-0">${log.time}</span>
        </div>
      `).join('');
    }

    function resetGame() {
      if (confirm("Reset seluruh data permainan dan mulai dari awal?")) {
        location.reload();
      }
    }

    init();
  </script>
</body>
</html>
